# ============================================================
# CoinSifter Configuration
# Copy this file to config.yaml and fill in your info
# ============================================================

# === Binance API Settings ===
# Go to Binance Account → API Management → Create API Key
# Read-only permission is sufficient — no trading permission needed
binance:
  api_key: "YOUR_BINANCE_API_KEY"
  api_secret: "YOUR_BINANCE_API_SECRET"

# === Scan Settings ===
scan:
  quote_currency: "USDT"
  min_volume_24h: 50000000       # Minimum 24h volume (USDT)
  top_n: 50                      # Max number of results

# === Filter Conditions ===
# Mode: "and" (all must pass) or "or" (any passes)
filter_mode: "and"

filters:
  # --- RSI range ---
  - indicator: rsi
    timeframe: 4h
    period: 14
    condition: between
    value: [50, 70]

  # --- Price above EMA50 ---
  - indicator: ema
    timeframe: 4h
    period: 50
    condition: price_above

  # --- MACD bullish crossover ---
  - indicator: macd
    timeframe: 1h
    condition: bullish           # bullish = MACD > Signal line

  # --- Volume above average ---
  - indicator: volume
    timeframe: 1h
    condition: above_average
    multiplier: 1.5              # Above 1.5x average volume
